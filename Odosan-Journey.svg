<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 884" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" role="img" aria-label="Odosan homeowner journey: a problem leads to opening Odosan, snapping a photo, an AI diagnosis with optional clarifying questions, then a fork into a DIY path or a pro path, both saved to a My Home maintenance journey.">
  <defs><linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F1F7FB"/><stop offset="1" stop-color="#FBF3F6"/></linearGradient></defs>
  <rect x="0" y="0" width="1200" height="884" fill="url(#bg1)"/>

  <text x="48" y="52" font-size="26" font-weight="700" fill="#0F172A">Odosan · homeowner journey</text>
  <text x="48" y="80" font-size="13.5" fill="#64748B">From a problem to a fix — and a home that remembers. What the homeowner actually does, step by step.</text>

  <rect x="360" y="118" width="210" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="465" y="146" font-size="13.5" font-weight="600" fill="#1E293B" text-anchor="middle">Something breaks at home</text>
  <rect x="600" y="118" width="230" height="46" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="715" y="140" font-size="12.5" font-weight="600" fill="#92400E" text-anchor="middle">Reminder from My Home</text>
  <text x="715" y="156" font-size="10" fill="#B45309" text-anchor="middle">planned</text>

  <line x1="470" y1="164" x2="545" y2="196" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <line x1="710" y1="164" x2="610" y2="196" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>

  <rect x="470" y="196" width="210" height="48" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text x="575" y="225" font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">Open Odosan</text>

  <line x1="575" y1="244" x2="575" y2="270" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <rect x="425" y="270" width="300" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="575" y="298" font-size="14" font-weight="600" fill="#1E293B" text-anchor="middle">Snap a photo + a sentence</text>

  <line x1="575" y1="316" x2="575" y2="338" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <rect x="425" y="338" width="300" height="52" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="575" y="362" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">AI diagnosis</text>
  <text x="575" y="380" font-size="11.5" fill="#64748B" text-anchor="middle">issue · urgency · fair price</text>

  <line x1="575" y1="390" x2="575" y2="412" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <rect x="425" y="412" width="300" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="575" y="440" font-size="13.5" font-weight="600" fill="#1E293B" text-anchor="middle">Not sure? 1–2 quick questions</text>

  <line x1="575" y1="458" x2="575" y2="480" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <rect x="445" y="480" width="260" height="46" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="575" y="508" font-size="15" font-weight="700" fill="#1E3A8A" text-anchor="middle">DIY or hire a pro?</text>

  <line x1="575" y1="526" x2="575" y2="544" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="270" y1="544" x2="900" y2="544" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="270" y1="544" x2="270" y2="566" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="900" y1="544" x2="900" y2="566" stroke="#CBD5E1" stroke-width="1.5"/>

  <text x="270" y="558" font-size="12" font-weight="700" fill="#2563EB" text-anchor="middle">free fix</text>
  <text x="900" y="558" font-size="12" font-weight="700" fill="#2563EB" text-anchor="middle">stay private</text>

  <rect x="150" y="566" width="240" height="54" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="270" y="590" font-size="13.5" font-weight="600" fill="#1E293B" text-anchor="middle">See the exact parts to buy</text>
  <text x="270" y="608" font-size="11.5" fill="#64748B" text-anchor="middle">on Amazon</text>
  <line x1="270" y1="620" x2="270" y2="642" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <rect x="150" y="642" width="240" height="50" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="270" y="666" font-size="13.5" font-weight="600" fill="#1E293B" text-anchor="middle">Fix it yourself</text>
  <text x="270" y="683" font-size="11.5" fill="#64748B" text-anchor="middle">save the labor cost</text>

  <rect x="770" y="566" width="260" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="900" y="594" font-size="13.5" font-weight="600" fill="#1E293B" text-anchor="middle">Match 2–3 vetted local pros</text>
  <line x1="900" y1="612" x2="900" y2="630" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <rect x="770" y="630" width="260" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="900" y="658" font-size="12.5" font-weight="600" fill="#1E293B" text-anchor="middle">Compare quotes · stay anonymous</text>
  <line x1="900" y1="676" x2="900" y2="694" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="2 5"/>
  <rect x="770" y="694" width="260" height="46" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="900" y="722" font-size="13.5" font-weight="600" fill="#1E293B" text-anchor="middle">Consent → connect</text>

  <path d="M270,692 C 270,760 400,762 420,792" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M900,740 C 900,772 760,770 740,798" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>

  <rect x="420" y="792" width="320" height="58" rx="12" fill="#F5F8FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="580" y="819" font-size="15" font-weight="700" fill="#1E3A8A" text-anchor="middle">Saved to My Home</text>
  <text x="580" y="838" font-size="11.5" fill="#2563EB" text-anchor="middle">your home maintenance journey</text>
  <text x="580" y="872" font-size="12" font-weight="700" fill="#2563EB" text-anchor="middle">your home remembers every fix</text>
</svg>
